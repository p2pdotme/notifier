      - TELEGRAM_ARS_ORDER_UPDATES_CHANNEL_ID=${TELEGRAM_ARS_ORDER_UPDATES_CHANNEL_ID}
      - TELEGRAM_ARS_ORDER_UPDATES_TOPIC_ID=${TELEGRAM_ARS_ORDER_UPDATES_TOPIC_ID}
      - TELEGRAM_ARS_DISPUTE_TOPIC_ID=${TELEGRAM_ARS_DISPUTE_TOPIC_ID}
      - TELEGRAM_ARS_REPORT_TOPIC_ID=${TELEGRAM_ARS_REPORT_TOPIC_ID}
      - TELEGRAM_ARS_PRICE_UPDATES_CHANNEL_ID=${TELEGRAM_ARS_PRICE_UPDATES_CHANNEL_ID}
      - TELEGRAM_ARS_PRICE_UPDATES_TOPIC_ID=${TELEGRAM_ARS_PRICE_UPDATES_TOPIC_ID}

      # MEX
      - TELEGRAM_MEX_ALERTS_BOT_TOKEN=${TELEGRAM_MEX_ALERTS_BOT_TOKEN}
      - TELEGRAM_MEX_BUY_ORDER_BOT_TOKEN=${TELEGRAM_MEX_BUY_ORDER_BOT_TOKEN}
      - TELEGRAM_MEX_SELL_ORDER_BOT_TOKEN=${TELEGRAM_MEX_SELL_ORDER_BOT_TOKEN}
      - TELEGRAM_MEX_PAY_ORDER_BOT_TOKEN=${TELEGRAM_MEX_PAY_ORDER_BOT_TOKEN}
      - TELEGRAM_MEX_REPORT_BOT_TOKEN=${TELEGRAM_MEX_REPORT_BOT_TOKEN}
      - TELEGRAM_MEX_ORDER_UPDATES_CHANNEL_ID=${TELEGRAM_MEX_ORDER_UPDATES_CHANNEL_ID}
      - TELEGRAM_MEX_ORDER_UPDATES_TOPIC_ID=${TELEGRAM_MEX_ORDER_UPDATES_TOPIC_ID}
      - TELEGRAM_MEX_DISPUTE_TOPIC_ID=${TELEGRAM_MEX_DISPUTE_TOPIC_ID}
      - TELEGRAM_MEX_REPORT_TOPIC_ID=${TELEGRAM_MEX_REPORT_TOPIC_ID}
      - TELEGRAM_MEX_PRICE_UPDATES_CHANNEL_ID=${TELEGRAM_MEX_PRICE_UPDATES_CHANNEL_ID}
      - TELEGRAM_MEX_PRICE_UPDATES_TOPIC_ID=${TELEGRAM_MEX_PRICE_UPDATES_TOPIC_ID}

      # VEN
      - TELEGRAM_VEN_ALERTS_BOT_TOKEN=${TELEGRAM_VEN_ALERTS_BOT_TOKEN}
      - TELEGRAM_VEN_BUY_ORDER_BOT_TOKEN=${TELEGRAM_VEN_BUY_ORDER_BOT_TOKEN}
      - TELEGRAM_VEN_SELL_ORDER_BOT_TOKEN=${TELEGRAM_VEN_SELL_ORDER_BOT_TOKEN}
      - TELEGRAM_VEN_PAY_ORDER_BOT_TOKEN=${TELEGRAM_VEN_PAY_ORDER_BOT_TOKEN}
      - TELEGRAM_VEN_REPORT_BOT_TOKEN=${TELEGRAM_VEN_REPORT_BOT_TOKEN}
      - TELEGRAM_VEN_ORDER_UPDATES_CHANNEL_ID=${TELEGRAM_VEN_ORDER_UPDATES_CHANNEL_ID}
      - TELEGRAM_VEN_ORDER_UPDATES_TOPIC_ID=${TELEGRAM_VEN_ORDER_UPDATES_TOPIC_ID}
      - TELEGRAM_VEN_DISPUTE_TOPIC_ID=${TELEGRAM_VEN_DISPUTE_TOPIC_ID}
      - TELEGRAM_VEN_REPORT_TOPIC_ID=${TELEGRAM_VEN_REPORT_TOPIC_ID}
      - TELEGRAM_VEN_PRICE_UPDATES_CHANNEL_ID=${TELEGRAM_VEN_PRICE_UPDATES_CHANNEL_ID}
      - TELEGRAM_VEN_PRICE_UPDATES_TOPIC_ID=${TELEGRAM_VEN_PRICE_UPDATES_TOPIC_ID}

      # Push Notifications
      - PUSH_NOTIF_X_SECRET_KEY=${PUSH_NOTIF_X_SECRET_KEY}
      - PUSH_NOTIF_BASE_URL=${PUSH_NOTIF_BASE_URL}
      - PUSH_NOTIF_IMAGE_URL=${PUSH_NOTIF_IMAGE_URL}
      - PUSH_NOTIF_LANDING_URL=${PUSH_NOTIF_LANDING_URL}

profiles:
  compute:
    redis:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 1Gi
        storage:
          size: 1Gi

    notifiers:
      resources:
        cpu:
          units: 2
        memory:
          size: 2Gi
        storage:
          size: 2Gi

  placement:
    dcloud:
      pricing:
        redis:
          denom: uakt
          amount: 2000
        notifiers:
          denom: uakt
          amount: 10000

deployment:
  redis:
    dcloud:
      profile: redis
      count: 1

  notifiers:
    dcloud:
      profile: notifiers
      count: 1
