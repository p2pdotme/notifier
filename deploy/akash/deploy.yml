# Akash SDL template.
# 1. Build and push your image: ./build_and_push.sh
# 2. Replace youruser/p2pme-notifiers:v0.1.0 below with your image
# 3. Run ./generate_deploy.sh to inject secrets from .env → deploy.final.yml
# 4. Upload deploy.final.yml to the Akash Console
version: "2.0"

services:
  redis:
    image: redis:7-alpine
    expose:
      - port: 6379
        as: 6379
        to:
          - service: notifiers

  notifiers:
    image: youruser/p2pme-notifiers:v0.1.0
    expose:
      - port: 8000
        as: 80
        to:
          - global: true
    env:
      - REDIS_URL=redis://redis:6379
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - DIAMOND_ADDRESS=${DIAMOND_ADDRESS}

      # OnFail Telegram
      - TELEGRAM_ONFAIL_BOT_TOKEN=${TELEGRAM_ONFAIL_BOT_TOKEN}
      - TELEGRAM_ONFAIL_CHANNEL_ID=${TELEGRAM_ONFAIL_CHANNEL_ID}
      - TELEGRAM_ONFAIL_TOPIC_ID=${TELEGRAM_ONFAIL_TOPIC_ID}

      # INR
      - TELEGRAM_INR_ALERTS_BOT_TOKEN=${TELEGRAM_INR_ALERTS_BOT_TOKEN}
      - TELEGRAM_INR_BUY_ORDER_BOT_TOKEN=${TELEGRAM_INR_BUY_ORDER_BOT_TOKEN}
      - TELEGRAM_INR_SELL_ORDER_BOT_TOKEN=${TELEGRAM_INR_SELL_ORDER_BOT_TOKEN}
      - TELEGRAM_INR_PAY_ORDER_BOT_TOKEN=${TELEGRAM_INR_PAY_ORDER_BOT_TOKEN}
      - TELEGRAM_INR_REPORT_BOT_TOKEN=${TELEGRAM_INR_REPORT_BOT_TOKEN}
      - TELEGRAM_INR_ORDER_UPDATES_CHANNEL_ID=${TELEGRAM_INR_ORDER_UPDATES_CHANNEL_ID}
      - TELEGRAM_INR_ORDER_UPDATES_TOPIC_ID=${TELEGRAM_INR_ORDER_UPDATES_TOPIC_ID}
      - TELEGRAM_INR_DISPUTE_TOPIC_ID=${TELEGRAM_INR_DISPUTE_TOPIC_ID}
      - TELEGRAM_INR_REPORT_TOPIC_ID=${TELEGRAM_INR_REPORT_TOPIC_ID}
      - TELEGRAM_INR_PRICE_UPDATES_CHANNEL_ID=${TELEGRAM_INR_PRICE_UPDATES_CHANNEL_ID}
      - TELEGRAM_INR_PRICE_UPDATES_TOPIC_ID=${TELEGRAM_INR_PRICE_UPDATES_TOPIC_ID}

      # IDR
      - TELEGRAM_IDR_ALERTS_BOT_TOKEN=${TELEGRAM_IDR_ALERTS_BOT_TOKEN}
      - TELEGRAM_IDR_BUY_ORDER_BOT_TOKEN=${TELEGRAM_IDR_BUY_ORDER_BOT_TOKEN}
      - TELEGRAM_IDR_SELL_ORDER_BOT_TOKEN=${TELEGRAM_IDR_SELL_ORDER_BOT_TOKEN}
      - TELEGRAM_IDR_PAY_ORDER_BOT_TOKEN=${TELEGRAM_IDR_PAY_ORDER_BOT_TOKEN}
      - TELEGRAM_IDR_REPORT_BOT_TOKEN=${TELEGRAM_IDR_REPORT_BOT_TOKEN}
      - TELEGRAM_IDR_ORDER_UPDATES_CHANNEL_ID=${TELEGRAM_IDR_ORDER_UPDATES_CHANNEL_ID}
      - TELEGRAM_IDR_ORDER_UPDATES_TOPIC_ID=${TELEGRAM_IDR_ORDER_UPDATES_TOPIC_ID}
      - TELEGRAM_IDR_DISPUTE_TOPIC_ID=${TELEGRAM_IDR_DISPUTE_TOPIC_ID}
      - TELEGRAM_IDR_REPORT_TOPIC_ID=${TELEGRAM_IDR_REPORT_TOPIC_ID}
      - TELEGRAM_IDR_PRICE_UPDATES_CHANNEL_ID=${TELEGRAM_IDR_PRICE_UPDATES_CHANNEL_ID}
      - TELEGRAM_IDR_PRICE_UPDATES_TOPIC_ID=${TELEGRAM_IDR_PRICE_UPDATES_TOPIC_ID}

      # BRL
      - TELEGRAM_BRL_ALERTS_BOT_TOKEN=${TELEGRAM_BRL_ALERTS_BOT_TOKEN}
      - TELEGRAM_BRL_BUY_ORDER_BOT_TOKEN=${TELEGRAM_BRL_BUY_ORDER_BOT_TOKEN}
      - TELEGRAM_BRL_SELL_ORDER_BOT_TOKEN=${TELEGRAM_BRL_SELL_ORDER_BOT_TOKEN}
      - TELEGRAM_BRL_PAY_ORDER_BOT_TOKEN=${TELEGRAM_BRL_PAY_ORDER_BOT_TOKEN}
      - TELEGRAM_BRL_REPORT_BOT_TOKEN=${TELEGRAM_BRL_REPORT_BOT_TOKEN}
      - TELEGRAM_BRL_ORDER_UPDATES_CHANNEL_ID=${TELEGRAM_BRL_ORDER_UPDATES_CHANNEL_ID}
      - TELEGRAM_BRL_ORDER_UPDATES_TOPIC_ID=${TELEGRAM_BRL_ORDER_UPDATES_TOPIC_ID}
      - TELEGRAM_BRL_DISPUTE_TOPIC_ID=${TELEGRAM_BRL_DISPUTE_TOPIC_ID}
      - TELEGRAM_BRL_REPORT_TOPIC_ID=${TELEGRAM_BRL_REPORT_TOPIC_ID}
      - TELEGRAM_BRL_PRICE_UPDATES_CHANNEL_ID=${TELEGRAM_BRL_PRICE_UPDATES_CHANNEL_ID}
      - TELEGRAM_BRL_PRICE_UPDATES_TOPIC_ID=${TELEGRAM_BRL_PRICE_UPDATES_TOPIC_ID}

      # ARS
      - TELEGRAM_ARS_ALERTS_BOT_TOKEN=${TELEGRAM_ARS_ALERTS_BOT_TOKEN}
      - TELEGRAM_ARS_BUY_ORDER_BOT_TOKEN=${TELEGRAM_ARS_BUY_ORDER_BOT_TOKEN}
      - TELEGRAM_ARS_SELL_ORDER_BOT_TOKEN=${TELEGRAM_ARS_SELL_ORDER_BOT_TOKEN}
      - TELEGRAM_ARS_PAY_ORDER_BOT_TOKEN=${TELEGRAM_ARS_PAY_ORDER_BOT_TOKEN}
