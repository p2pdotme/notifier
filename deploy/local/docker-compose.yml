services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  notifiers:
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file: ../../.env
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
